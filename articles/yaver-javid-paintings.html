<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long Records</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" type="image/x-icon" href="../favicon.png">
</head>

<body>


    <div class="container">
        <img src="../logo.png" alt="LOGO" width="60%" onclick="window.location.href = '../'">
        <hr>
        <div class="title">
            Paintings
        </div>
        <div class="author">
            Painter : Yaver Javid
        </div>
        <hr>
        <div class="content">
            <div class="painting">
                <img src="prints/yj-white-paste-boy.png" alt="Print 1" width="80%">
                <br>
                <span>The White Paste Boy, 2025</span>
            </div>

        </div>
        <div class="content">
            <div class="painting">
                <img src="prints/yj-print.png" alt="Print 2" width="80%">
                <br>
                <span>Print One, 2026</span>
            </div>

        </div>
    </div>

    <style>
        .painting {
            width: 100%;
            text-align: center;
        }

        .painting img {
            border: 1px solid black;

        }
    </style>
</body>

</html>
