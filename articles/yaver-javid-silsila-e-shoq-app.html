<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Long Records</title>
  <link rel="shortcut icon" type="image/x-icon" href="../favicon.png">
</head>

<body>

  <div id="phone">
    <img src="assets/title-pashmina.jpg" class="title" width="100%" style="user-select: none">
    <div id="poem-container">
      <div class="poem">
        <p>
          ابھی ہیں اور قصے باقی
          <br /> از سوانح، با ساقی
        </p>
        <p>
          کچھ مستی کچھ آہنگ
          <br /> اک شوقِ جمازیبی
        </p>
        <p>
          "میں بھی کوئی گل ہوں؟"
          <br /> ہم نوا، گلِ لالی
        </p>
        <p>
          ہے اس قلم کا اندازِ
          <br /> کشمیری و حجازی
        </p>
        <p>
          دشمن بھی اُٹھاتے اس کے مزے
          <br /> میری بے خبر یاوریؔ
        </p>
      </div>
    </div>
    <div class="control">
      <div class="button"></div>
      <span style="user-select: none"></span>
      <div class="button right"></div>
    </div>
  </div>

  <style>
    body {
      width: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #phone {
      /* background: red; */
      width: 100%;
      display: flex;
      flex-direction: column;
      padding: 16px;
      box-sizing: border-box;
      gap: 8px;
      align-items: center;
      max-width: 600px;
    }

    #poem-container {
      /* background-color: yellow; */
      flex: 1;
      background-image: url("assets/potrait-border-pashmina.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      display: flex;
      width: 100%;
    }

    .control {
      /* background: blue; */
      width: 100%;
      height: 64px;
      display: flex;
      justify-content: center;
      gap: 16px;
      align-items: center;
    }

    .button {
      height: 64px;
      width: 64px;
      background-image: url("assets/button-left-pashmina.png");
      background-size: 100% 100%;
    }

    .right {
      transform: rotate(180deg);
    }

    .poem {
      flex: 1;
      /* background: red; */
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #text {
      background: yellow;
    }

    @font-face {
      font-family: urdu;
      src: url("../fonts/nn.ttf");
    }

    * {}

    p,
    span {
      font-family: urdu;
    }
  </style>

  <script src="poems.js"></script>

  <script>

    phone.style.height = window.innerHeight + "px"
    

    function toUrduNumerals(input) {
      const map = {
        '0': '۰', '1': '۱', '2': '۲', '3': '۳', '4': '۴',
        '5': '۵', '6': '۶', '7': '۷', '8': '۸', '9': '۹'
      };
      return String(input).replace(/\d/g, d => map[d]);
    }

    let poemIndex = 0
    let pageIndex = 0
    const PAGE_SIZE = 5

    const container = document.querySelector("#poem-container")
    const indicator = document.querySelector(".control span")

    function getPages(couplets) {
      const pages = []
      for (let i = 0; i < couplets.length; i += PAGE_SIZE) {
        pages.push(couplets.slice(i, i + PAGE_SIZE))
      }
      return pages
    }

    function render() {
      const poem = poetry[poemIndex].couplets
      const pages = getPages(poem)
      const page = pages[pageIndex]

      container.innerHTML = ""

      const wrapper = document.createElement("div")
      wrapper.className = "poem"


      page.forEach(([l1, l2]) => {
        const p = document.createElement("p")
        p.innerHTML = `${l1}<br/>${l2}`
        wrapper.appendChild(p)
      })

      container.appendChild(wrapper)

      // indicator: "2/15 — 1/3"e
      // indicator.textContent = `${poemIndex + 1}/${poetry.length} — ${pageIndex + 1}/${pages.length}`

      indicator.textContent =
        `${toUrduNumerals(poetry.length)}/${toUrduNumerals(poemIndex + 1)}`
    }

    // LEFT BUTTON
    document.querySelector(".button").onclick = () => {
      if (pageIndex > 0) {
        pageIndex--
      } else {
        poemIndex = (poemIndex - 1 + poetry.length) % poetry.length
        const pages = getPages(poetry[poemIndex].couplets)
        pageIndex = pages.length - 1
      }
      render()
    }

    // RIGHT BUTTON
    document.querySelector(".button.right").onclick = () => {
      const pages = getPages(poetry[poemIndex].couplets)

      if (pageIndex < pages.length - 1) {
        pageIndex++
      } else {
        poemIndex = (poemIndex + 1) % poetry.length
        pageIndex = 0
      }
      render()
    }

    render()
  </script>
</body>

</html>
