<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long Records</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" type="image/x-icon" href="../favicon.png">
</head>

<style>
    @font-face {
        font-family: urdu;
        src: url("../fonts/nn.ttf");
    }

    * {

        line-height-step: 12px;
    }

    p {
        font-family: urdu;
    }

    .normal-font * {
        font-family: Arial, sans-serif;
    }

    button {
        font-family: urdu;
        font-size: 18px;
        padding: 10px 20px;
        border: 1px solid #ccc;
        background-color: #fff;
        cursor: pointer;
        margin: 10px auto;
        display: block;
        border-radius: 5px;
    }

    button:hover {
        background-color: #f0f0f0;
    }
</style>

<body>
    <div class="container">
        <img src="../logo.png" alt="LOGO" width="60%" onclick="window.location.href = '../'">
        <hr>
        <div class="title">
            Silsila e Shoq
        </div>
        <div class="author">
            Poet : Yaver Javid
            <br />
            شاعر: یاور جاوید
        </div>
    </div>

    <script src="poems.js"></script>
    <script>
        let html = "";

        for (let i = 0; i < poetry.length; i++) {
            let poem = poetry[i].couplets;

            html += "<hr><div class='poetry content'>"

            for (let j = 0; j < poem.length; j++) {
                const couplet = poem[j];

                let [line1, line2] = couplet;

                html += `<p>${line1} <br> ${line2}</p>`


            }

            html += "</div>"

        }

        document.querySelector(".container").innerHTML += html

    </script>
</body>

</html>
